<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CAD to USD Split</title>
    <meta
      name="description"
      content="A simple brutalist Canada to U.S. dollar converter with tip and split math."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page" data-converter>
      <section class="frame" aria-labelledby="title">
        <header class="bar">
          <span>CAD / USD</span>
          <span data-mode-label>DINNER SPLIT</span>
        </header>

        <nav class="tabs" aria-label="Converter mode">
          <button type="button" class="is-active" id="tab-simple" aria-controls="panel-simple" aria-selected="true" role="tab" data-mode-tab="simple">
            Simple converter
          </button>
          <button type="button" id="tab-dinner" aria-controls="panel-dinner" aria-selected="false" role="tab" data-mode-tab="dinner">
            Dinner split
          </button>
        </nav>

        <section class="hero">
          <div>
            <p>CANADA TO U.S. DOLLAR</p>
            <h1 id="title" data-title>CONVERT.</h1>
          </div>
          <aside>
            <span>DEFAULT RATE</span>
            <strong>1 CAD = 0.7146 USD</strong>
          </aside>
        </section>

        <section class="mode-panel is-active" id="panel-simple" role="tabpanel" aria-labelledby="tab-simple" data-mode-panel="simple">
          <form class="inputs inputs-simple">
            <label class="field field-main">
              <span>Amount in CAD</span>
              <input type="number" min="0" step="0.01" inputmode="decimal" value="120" data-input="simpleCad" />
            </label>
            <label class="field">
              <span>CAD to USD rate</span>
              <input type="number" min="0" step="0.0001" inputmode="decimal" value="0.7146" data-input="simpleRate" />
            </label>
          </form>

          <section class="results results-simple" aria-live="polite">
            <article class="result result-primary">
              <span>USD total</span>
              <strong data-output="simpleUsd">$0.00</strong>
            </article>
            <article class="result">
              <span>CAD entered</span>
              <strong data-output="simpleCad">$0.00</strong>
            </article>
            <article class="result">
              <span>Rate used</span>
              <strong data-output="simpleRate">0.7146</strong>
            </article>
          </section>
        </section>

        <section class="mode-panel" id="panel-dinner" role="tabpanel" aria-labelledby="tab-dinner" hidden data-mode-panel="dinner">
          <form class="inputs">
            <label class="field field-main">
              <span>Tab in CAD</span>
              <input type="number" min="0" step="0.01" inputmode="decimal" value="120" data-input="cad" />
            </label>
            <label class="field">
              <span>CAD to USD rate</span>
              <input type="number" min="0" step="0.0001" inputmode="decimal" value="0.7146" data-input="rate" />
            </label>
            <label class="field">
              <span>Tip percent</span>
              <input type="number" min="0" step="1" inputmode="decimal" value="20" data-input="tip" />
            </label>
            <label class="field">
              <span>Split by</span>
              <input type="number" min="1" step="1" inputmode="numeric" value="2" data-input="people" />
            </label>
          </form>

          <div class="tip-buttons" aria-label="Tip shortcuts">
            <button type="button" data-tip="15">15%</button>
            <button type="button" data-tip="18">18%</button>
            <button type="button" data-tip="20">20%</button>
            <button type="button" data-tip="25">25%</button>
          </div>

          <section class="results" aria-live="polite">
            <article class="result result-primary">
              <span>Each pays</span>
              <strong data-output="each">$0.00</strong>
            </article>
            <article class="result">
              <span>Subtotal USD</span>
              <strong data-output="subtotal">$0.00</strong>
            </article>
            <article class="result">
              <span>Tip USD</span>
              <strong data-output="tip">$0.00</strong>
            </article>
            <article class="result">
              <span>Total USD</span>
              <strong data-output="total">$0.00</strong>
            </article>
          </section>
        </section>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
